apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eventlens-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /()(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-service
            port:
              number: {{ .Values.api.service.port }}
      - path: /grafana(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: grafana-service
            port:
              number: {{ .Values.grafana.service.port }}
      - path: /jaeger(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: jaeger
            port:
              number: {{ .Values.jaeger.service.uiPort }}
